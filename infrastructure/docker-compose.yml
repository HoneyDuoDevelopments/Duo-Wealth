services:
  duo-wealth-db-test:
    image: postgres:16-alpine
    container_name: duo-wealth-db-test
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_TEST_USER}
      - POSTGRES_PASSWORD=${POSTGRES_TEST_PASSWORD}
      - POSTGRES_DB=${POSTGRES_TEST_DB}
    volumes:
      - duo-wealth-test-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_TEST_PORT:-5433}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_TEST_USER} -d ${POSTGRES_TEST_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - duo-wealth

  duo-wealth-db-prod:
    image: postgres:16-alpine
    container_name: duo-wealth-db-prod
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_PROD_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PROD_PASSWORD}
      - POSTGRES_DB=${POSTGRES_PROD_DB}
    volumes:
      - duo-wealth-prod-data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PROD_PORT:-5434}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_PROD_USER} -d ${POSTGRES_PROD_DB}"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - duo-wealth
    profiles:
      - prod

networks:
  duo-wealth:
    driver: bridge

volumes:
  duo-wealth-test-data:
  duo-wealth-prod-data:
